name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  # Fast gate: typecheck, chant lint (core + project-local .chant/rules/),
  # unit tests, and lifecycle-Op codegen. chant + lexicons are published npm
  # deps (@intentius/chant*), so no sibling checkout or codegen step is needed.
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: npm install
      - name: typecheck
        run: npm run tsc
      - name: lint
        run: npm run lint
      - name: test
        run: npm test
      - name: build ops
        run: npm run ops:build
