name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Deploy Loom to AWS via chant. Gated on the repo variable DEPLOY=true, so
  # it stays inert until you set that plus this environment's AWS secrets.
  #
  # Placeholder step: the real apply command lands once the composites
  # (#886-#889) and lifecycle Ops (#903) exist. Until then this job is a
  # no-op even if DEPLOY is flipped on.
  deploy:
    if: ${{ vars.DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Scope AWS credentials to a protected environment (set the secrets there).
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: loom-on-chant
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: INTENTIUS/chant
          path: chant
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: npm install
        working-directory: loom-on-chant
      - name: deploy
        working-directory: loom-on-chant
        run: |
          echo "TODO: npx chant run --components all --env prod (once composites + lifecycle Ops exist)"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
