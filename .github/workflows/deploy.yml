name: deploy

# Real deploy of Loom to AWS via chant: vendor Loom's app source, build+publish
# the images, then apply every stack in dependency order. Gated on the repo
# variable DEPLOY=true AND a protected `production` environment holding the AWS
# credentials + LOOM_* config, so it stays inert until a maintainer opts in.
#
# NOTE: this workflow has not been run end-to-end against real AWS yet — that
# is loomster#22 (full-stack E2E). It IS the real command path (no placeholder).

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: npm install

      # Fetch Loom v1.6.0 app source so the service docker-build steps have a context.
      - name: Vendor Loom source
        run: npm run vendor

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      # Dependency-ordered build -> publish (by digest) -> apply -> verify for
      # every component. `chant run --components all` derives the order from dependsOn.
      - name: Deploy (chant run --components all)
        run: npx chant run --components all --env "${{ vars.LOOM_ENV }}"
        env:
          LOOM_TIER: ${{ vars.LOOM_TIER }}
          LOOM_INSTANCE: ${{ vars.LOOM_INSTANCE }}
          LOOM_ENV: ${{ vars.LOOM_ENV }}
          LOOM_DOMAIN_NAME: ${{ vars.LOOM_DOMAIN_NAME }}
          LOOM_VPC_ID: ${{ vars.LOOM_VPC_ID }}
          LOOM_PUBLIC_SUBNET_IDS: ${{ vars.LOOM_PUBLIC_SUBNET_IDS }}
          LOOM_PRIVATE_SUBNET_IDS: ${{ vars.LOOM_PRIVATE_SUBNET_IDS }}
          LOOM_DB_PASSWORD: ${{ secrets.LOOM_DB_PASSWORD }}
