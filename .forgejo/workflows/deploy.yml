name: deploy

# Real deploy of Loom to AWS via chant on a Forgejo runner — the Forgejo
# counterpart to .github/workflows/deploy.yml. Vendors Loom's app source, then
# `chant run --components all` builds + publishes the images and applies every
# stack in dependency order. Gated on the repo variable DEPLOY=true, so it stays
# inert until a maintainer opts in.
#
# Needs a Forgejo runner (act_runner) with Docker access (the image build/publish
# steps) and AWS credentials + LOOM_* config as repo secrets/variables. Like the
# GitHub deploy.yml, this is the real command path (no placeholder) but has not
# been run end to end against real AWS yet — see loomster#22.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    if: ${{ vars.DEPLOY == 'true' }}
    runs-on: docker
    container: node:22
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      # node:22 ships neither awscli nor the docker CLI; the runner provides the
      # Docker daemon (socket).
      - run: apt-get update -qq && apt-get install -y -qq awscli git docker.io >/dev/null 2>&1
      - run: npm install
      - name: Vendor Loom source
        run: npm run vendor
      - name: Deploy (chant run --components all)
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          npx chant run --components all --env "$LOOM_ENV"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          LOOM_TIER: ${{ vars.LOOM_TIER }}
          LOOM_INSTANCE: ${{ vars.LOOM_INSTANCE }}
          LOOM_ENV: ${{ vars.LOOM_ENV }}
          LOOM_DOMAIN_NAME: ${{ vars.LOOM_DOMAIN_NAME }}
          LOOM_VPC_ID: ${{ vars.LOOM_VPC_ID }}
          LOOM_PUBLIC_SUBNET_IDS: ${{ vars.LOOM_PUBLIC_SUBNET_IDS }}
          LOOM_PRIVATE_SUBNET_IDS: ${{ vars.LOOM_PRIVATE_SUBNET_IDS }}
          LOOM_DB_PASSWORD: ${{ secrets.LOOM_DB_PASSWORD }}
