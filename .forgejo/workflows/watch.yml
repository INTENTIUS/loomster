name: watch

# Scheduled Forgejo Actions trigger for loom-watch (drift detection) — the
# Forgejo counterpart to .github/workflows/watch.yml. A thin trigger: the one
# real step is `npm run watch`. Inert until SCHEDULED_WATCH=true; needs AWS
# credentials as repo secrets (a live `chant lifecycle diff`).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  watch:
    if: ${{ vars.SCHEDULED_WATCH == 'true' }}
    runs-on: docker
    container: node:22
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - run: apt-get update -qq && apt-get install -y -qq awscli git >/dev/null 2>&1
      - run: npm install
      - name: watch
        run: npm run watch
        env:
          LOOM_ENV: ${{ vars.LOOM_ENV }}
          LOOM_TIER: ${{ vars.LOOM_TIER }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
