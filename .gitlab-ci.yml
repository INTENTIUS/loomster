# Root GitLab pipeline. It wires together three things a team on GitLab needs:
#
#  1. The generated component pipeline (.gitlab/components.yml) — one job per
#     component, wave-ordered by `needs:`. Regenerate it with
#     `npm run generate:gitlab`; src/gitlab-pipeline.test.ts guards it against
#     drift. It is included on normal (push / MR / web) pipelines and SKIPPED on
#     schedule pipelines, so a scheduled lifecycle run never triggers a deploy.
#  2. A gated deploy job (inert until DEPLOY=true; a manual button, never on a
#     schedule), mirroring .github/workflows/deploy.yml.
#  3. The scheduled lifecycle jobs (watch / reconcile / cost-report / audit),
#     each inert until its own variable is set and run only on schedules,
#     mirroring the GitHub crons.
#
# See https://intentius.io/loomster/guides/ci/ for how each provider compares.

include:
  - local: .gitlab/components.yml
    rules:
      - if: '$CI_PIPELINE_SOURCE != "schedule"'

variables:
  LOOM_ENV: dev
  LOOM_TIER: light

# ── Gated deploy (mirrors deploy.yml) ────────────────────────────────────────
# Inert until the DEPLOY variable is set. Never runs on a schedule, and always a
# manual button rather than automatic. Provide AWS credentials as protected/
# masked CI/CD variables (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY).
deploy:
  stage: .post
  image: node:22
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$DEPLOY == "true"'
      when: manual
    - when: never
  before_script:
    - apt-get update -qq && apt-get install -y -qq awscli git >/dev/null 2>&1
    - npm ci --no-audit --no-fund
    - npm run vendor
  script:
    - npx chant run --components all --env "$LOOM_ENV"

# ── Scheduled lifecycle (mirrors watch/reconcile/cost-report/audit.yml) ───────
# A hidden base for the shared setup. Each concrete job runs only on a schedule
# and only when its own SCHEDULED_* variable is set to "true".
.lifecycle:
  stage: .pre
  image: node:22
  before_script:
    - apt-get update -qq && apt-get install -y -qq awscli git >/dev/null 2>&1
    - npm ci --no-audit --no-fund

watch:
  extends: .lifecycle
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_WATCH == "true"'
  script:
    - npm run watch

reconcile:
  extends: .lifecycle
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_RECONCILE == "true" && ($LOOM_TIER == "production" || $LOOM_TIER == "production-ha")'
  script:
    - npm run reconcile

cost-report:
  extends: .lifecycle
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_COST_REPORT == "true"'
  script:
    - npm run synth
    - npm run estimate-cost

audit:
  extends: .lifecycle
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_AUDIT == "true"'
  script:
    - npm run audit
