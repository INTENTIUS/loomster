stages:
  - wave-1
  - wave-2
  - wave-3
  - wave-4

loom-cognito:
  stage: wave-1
  image: node:22-slim
  script:
    - chant run --components loom-cognito --env production --dump-outputs loom-cognito.outputs.json
  artifacts:
    paths:
      - loom-cognito.outputs.json

shared-foundation:
  stage: wave-1
  image: node:22-slim
  script:
    - chant run --components shared-foundation --env production --dump-outputs shared-foundation.outputs.json
  artifacts:
    paths:
      - shared-foundation.outputs.json

downstream-stub:
  stage: wave-2
  image: node:22-slim
  script:
    - chant run --components downstream-stub --env production --seed-outputs shared-foundation.outputs.json
  needs:
    - shared-foundation

loom-db:
  stage: wave-2
  image: node:22-slim
  script:
    - chant run --components loom-db --env production --seed-outputs shared-foundation.outputs.json --dump-outputs loom-db.outputs.json
  needs:
    - shared-foundation
  artifacts:
    paths:
      - loom-db.outputs.json

loom-frontend:
  stage: wave-2
  image: node:22-slim
  script:
    - chant run --components loom-frontend --env production --seed-outputs shared-foundation.outputs.json
  needs:
    - shared-foundation

loom-backend:
  stage: wave-3
  image: node:22-slim
  script:
    - chant run --components loom-backend --env production --seed-outputs shared-foundation.outputs.json --seed-outputs loom-db.outputs.json --seed-outputs loom-cognito.outputs.json --dump-outputs loom-backend.outputs.json
  needs:
    - loom-cognito
    - loom-db
    - shared-foundation
  artifacts:
    paths:
      - loom-backend.outputs.json

loom-agents:
  stage: wave-4
  image: node:22-slim
  script:
    - chant run --components loom-agents --env production --seed-outputs shared-foundation.outputs.json --seed-outputs loom-cognito.outputs.json --seed-outputs loom-backend.outputs.json
  needs:
    - loom-backend
    - loom-cognito
    - shared-foundation
